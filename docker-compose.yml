version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: archivision
      POSTGRES_USER: archivision
      POSTGRES_PASSWORD: archivision_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://archivision:archivision_secret@postgres:5432/archivision
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-refresh-secret}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      NODE_ENV: production
    depends_on:
      - postgres

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  pgdata:
